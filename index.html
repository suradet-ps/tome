<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tome - Technical Reading Tracker" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0b0e11" />
    <title>Tome - Technical Reading Tracker</title>

    <!-- Favicon (served by Trunk from `public/`) -->
    <link data-trunk rel="icon" type="image/svg+xml" href="public/favicon.svg" />

    <!-- Google Fonts (external, no `data-trunk`) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Application styles (Trunk processes + copies these into `dist/`) -->
    <link data-trunk rel="css" href="public/styles/variables.css" />
    <link data-trunk rel="css" href="public/styles/reset.css" />
    <link data-trunk rel="css" href="public/styles/highlight.css" />
    <link data-trunk rel="css" href="public/styles/main.css" />

    <!-- WASM entry point -->
    <link data-trunk rel="rust" data-weak-refs />
  </head>
  <body></body>
</html>
