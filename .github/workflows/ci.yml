name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - run: cargo check --target wasm32-unknown-unknown

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - run: cargo clippy --target wasm32-unknown-unknown -- -D clippy::correctness -D clippy::suspicious

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all --check

  design-tokens:
    name: design tokens (no raw hex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Raw color literals are only allowed in public/styles/variables.css
      # (the token definitions). Every other stylesheet and every Leptos
      # view! must reference a token via var(--...). See DESIGN.md.
      - name: Forbid raw hex colors outside variables.css
        run: |
          hits=$(grep -rInE '#[0-9a-fA-F]{6}\b|#[0-9a-fA-F]{3}\b' \
            public/styles src \
            --include='*.css' --include='*.rs' \
            | grep -v 'public/styles/variables.css' \
            | grep -v '&#39;' || true)
          if [ -n "$hits" ]; then
            echo "Raw hex color literals found outside variables.css:"
            echo "$hits"
            echo ""
            echo "Route colors through a design token (var(--...)) defined in"
            echo "public/styles/variables.css. See DESIGN.md."
            exit 1
          fi
          echo "OK: no raw hex outside variables.css"

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - run: cargo test --lib

  build:
    name: trunk build (release)
    runs-on: ubuntu-latest
    needs: [check, clippy, fmt, test, design-tokens]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Build
        run: trunk build --release
